<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 60" preserveAspectRatio="none" overflow="hidden">
  <defs>
    <style>
      /* horizontal scroll — one full period per cycle */
      @keyframes scroll {
        from { transform: translateX(0px); }
        to   { transform: translateX(-240px); }
      }

      /* music-beat amplitude envelopes:
         quick attack → decay → soft second hit → silence */
      @keyframes beat1 {
        0%   { transform: scaleY(0.04); }
        8%   { transform: scaleY(2.0);  }
        30%  { transform: scaleY(0.35); }
        52%  { transform: scaleY(0.75); }
        70%  { transform: scaleY(0.15); }
        100% { transform: scaleY(0.04); }
      }
      @keyframes beat2 {
        0%   { transform: scaleY(0.08); }
        10%  { transform: scaleY(1.7);  }
        38%  { transform: scaleY(0.4);  }
        56%  { transform: scaleY(0.9);  }
        78%  { transform: scaleY(0.18); }
        100% { transform: scaleY(0.08); }
      }
      @keyframes beat3 {
        0%   { transform: scaleY(0.04); }
        6%   { transform: scaleY(1.9);  }
        22%  { transform: scaleY(0.2);  }
        46%  { transform: scaleY(1.3);  }
        62%  { transform: scaleY(0.25); }
        80%  { transform: scaleY(0.7);  }
        100% { transform: scaleY(0.04); }
      }

      /* scroll layers */
      .s1 { animation: scroll 4s   linear infinite; }
      .s2 { animation: scroll 3.5s linear infinite; }
      .s3 { animation: scroll 2.8s linear infinite; }

      /* beat layers — scale from wave baseline y=30 */
      .b1 { animation: beat1 2.4s ease-in-out infinite;      transform-origin: 0px 30px; }
      .b2 { animation: beat2 2.4s ease-in-out infinite -0.6s; transform-origin: 0px 30px; }
      .b3 { animation: beat3 2.4s ease-in-out infinite -1.2s; transform-origin: 0px 30px; }
    </style>
  </defs>

  <!-- wave 1 · main purple · large amplitude -->
  <g class="s1"><g class="b1">
    <path d="M0,30 C40,16 80,16 120,30 C160,44 200,44 240,30
             C280,16 320,16 360,30 C400,44 440,44 480,30
             C520,16 560,16 600,30 C640,44 680,44 720,30
             C760,16 800,16 840,30 C880,44 920,44 960,30
             C1000,16 1040,16 1080,30 C1120,44 1160,44 1200,30
             C1240,16 1280,16 1320,30 C1360,44 1400,44 1440,30
             C1480,16 1520,16 1560,30 C1600,44 1640,44 1680,30
             C1720,16 1760,16 1800,30 C1840,44 1880,44 1920,30"
          fill="none" stroke="#85409D" stroke-width="2.5" opacity="0.95"
          vector-effect="non-scaling-stroke"/>
  </g></g>

  <!-- wave 2 · mid purple · medium amplitude -->
  <g class="s2"><g class="b2">
    <path d="M0,30 C40,21 80,21 120,30 C160,39 200,39 240,30
             C280,21 320,21 360,30 C400,39 440,39 480,30
             C520,21 560,21 600,30 C640,39 680,39 720,30
             C760,21 800,21 840,30 C880,39 920,39 960,30
             C1000,21 1040,21 1080,30 C1120,39 1160,39 1200,30
             C1240,21 1280,21 1320,30 C1360,39 1400,39 1440,30
             C1480,21 1520,21 1560,30 C1600,39 1640,39 1680,30
             C1720,21 1760,21 1800,30 C1840,39 1880,39 1920,30"
          fill="none" stroke="#A060C0" stroke-width="1.8" opacity="0.7"
          vector-effect="non-scaling-stroke"/>
  </g></g>

  <!-- wave 3 · gold accent · small amplitude -->
  <g class="s3"><g class="b3">
    <path d="M0,30 C40,25 80,25 120,30 C160,35 200,35 240,30
             C280,25 320,25 360,30 C400,35 440,35 480,30
             C520,25 560,25 600,30 C640,35 680,35 720,30
             C760,25 800,25 840,30 C880,35 920,35 960,30
             C1000,25 1040,25 1080,30 C1120,35 1160,35 1200,30
             C1240,25 1280,25 1320,30 C1360,35 1400,35 1440,30
             C1480,25 1520,25 1560,30 C1600,35 1640,35 1680,30
             C1720,25 1760,25 1800,30 C1840,35 1880,35 1920,30"
          fill="none" stroke="#EEA727" stroke-width="1.5" opacity="0.55"
          vector-effect="non-scaling-stroke"/>
  </g></g>
</svg>
